<!DOCTYPE html>
<html>
<head>
<title>Student Marks System</title>

<style>

body{
font-family: Arial;
background:#000000;
text-align:center;
}

.container{
width:650px;
margin:auto;
background:rgb(255, 255, 255);
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px rgb(128, 174, 22);
}

input{
display:block;
width:90%;
margin:10px auto;
padding:8px;
}

button{
padding:10px;
margin:5px;
background:#09e38f;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

#result{
margin-top:20px;
text-align:left;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid gray;
padding:8px;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h2>Student Result Processing System</h2>

<input type="text" id="name" placeholder="Student Name">
<input type="text" id="roll" placeholder="Roll Number">
<input type="number" id="math" placeholder="Math Marks">
<input type="number" id="science" placeholder="Science Marks">
<input type="number" id="english" placeholder="English Marks">

<button onclick="addStudent()">Add Student</button>

<br><br>

<button onclick="displayStudents()">Display All Students</button>
<button onclick="calculateTotals()">Calculate Totals</button>
<button onclick="calculateAverage()">Calculate Averages</button>
<button onclick="showTopStudents()">Above 80 Average</button>
<button onclick="showFailed()">Failed Students</button>
<button onclick="countStudents()">Count Students</button>

<div id="result"></div>

</div>


<script>

let students = [];

function addStudent(){

let name = document.getElementById("name").value;
let roll = document.getElementById("roll").value;
let math = Number(document.getElementById("math").value);
let science = Number(document.getElementById("science").value);
let english = Number(document.getElementById("english").value);

let student = {
name:name,
roll:roll,
math:math,
science:science,
english:english
};

students.push(student);

alert("Student added successfully");

}


function displayStudents(){

let output = "<h3>All Students</h3>";

for(let s of students){

output += `<p>
Name: ${s.name} | Roll: ${s.roll} |
Math: ${s.math} | Science: ${s.science} | English: ${s.english}
</p>`;

}

document.getElementById("result").innerHTML = output;

}


function calculateTotals(){

let output = "<h3>Total Marks</h3>";

for(let s of students){

let total = s.math + s.science + s.english;

output += `<p>${s.name} (Roll ${s.roll}) : Total = ${total}</p>`;

}

document.getElementById("result").innerHTML = output;

}


function calculateAverage(){

let output = "<h3>Average Marks</h3>";

for(let s of students){

let total = s.math + s.science + s.english;
let avg = total/3;

output += `<p>${s.name} : Average = ${avg.toFixed(2)}</p>`;

}

document.getElementById("result").innerHTML = output;

}


function showTopStudents(){

let output = "<h3>Students with Average > 80</h3>";

for(let s of students){

let total = s.math + s.science + s.english;
let avg = total/3;

if(avg>80){

output += `<p>${s.name} : Average = ${avg.toFixed(2)}</p>`;

}

}

document.getElementById("result").innerHTML = output;

}


function showFailed(){

let output = "<h3>Failed Students (Average < 40)</h3>";

for(let s of students){

let total = s.math + s.science + s.english;
let avg = total/3;

if(avg<40){

output += `<p>${s.name} : Average = ${avg.toFixed(2)}</p>`;

}

}

document.getElementById("result").innerHTML = output;

}


function countStudents(){

document.getElementById("result").innerHTML =
"<h3>Total Students : "+students.length+"</h3>";

}

</script>

</body>
</html>
